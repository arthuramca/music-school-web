services:
  db:
    image: postgres:16-alpine
    container_name: musicschool-db-dev
    environment:
      POSTGRES_DB: musicschool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

volumes:
  pgdata-dev:
