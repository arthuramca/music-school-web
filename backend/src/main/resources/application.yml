spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/musicschool}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:music-school-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000  # 24h

logging:
  level:
    com.arthas: DEBUG
